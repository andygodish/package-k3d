includes:
  - minio: tasks/minio.yaml
  - kubeconfig: tasks/kubeconfig.yaml

variables:
  - name: K3D_REGISTRY
    description: "Remote OCI registry for UDS K3d package"
    default: "ghcr.io/defenseunicorns/packages"
  - name: K3D_PACKAGE_NAME
    description: "Name of the UDS K3d package"
    default: "uds-k3d"
  - name: K3D_PACKAGE_VERSION
    description: "Version of the UDS K3d package"
    default: "0.20.0"
  - name: ARCHITECTURE
    description: "System architecture (amd64 or arm64)"
    default: ""
  - name: CONFIG_FILE
    description: "Path to the zarf config file"
    default: "zarf-config.toml"

  # For fetching kubeconfig from a remote MinIO endpoint (work-machine side)
  - name: MINIO_REMOTE_ENDPOINT
    description: "Remote MinIO endpoint URL (e.g. http://<ubuntu-ip>:9000)"
    default: ""
  - name: MINIO_REMOTE_ACCESS_KEY
    description: "Remote MinIO access key"
    default: ""
  - name: MINIO_REMOTE_SECRET_KEY
    description: "Remote MinIO secret key"
    default: ""

tasks:
  - name: pull
    description: "Pull UDS K3d package from OCI registry"
    actions:
      - description: "Pull UDS K3d package from OCI registry"
        cmd: |
          echo "Pulling UDS K3d package ${K3D_PACKAGE_NAME}:${K3D_PACKAGE_VERSION} from ${K3D_REGISTRY}"
          
          ARCH_FLAG=""
          if [ -n "${ARCHITECTURE}" ]; then
            ARCH_FLAG="-a ${ARCHITECTURE}"
            echo "Using specified architecture: ${ARCHITECTURE}"
          else
            echo "Using auto-detected architecture"
          fi
          
          uds zarf package pull ${ARCH_FLAG} oci://${K3D_REGISTRY}/${K3D_PACKAGE_NAME}:${K3D_PACKAGE_VERSION}
        env:
          - ZARF_LOG_LEVEL=info

  - name: transform-kubeconfig
    description: "Transform kubeconfig and write to ./uds-dev-config (wrapper around kubeconfig:transform)"
    actions:
      - task: kubeconfig:transform
        with:
          out: "./uds-dev-config"

  - name: upload-kubeconfig
    description: "Transform kubeconfig then upload it to MinIO bucket uds as a fixed object"
    actions:
      - task: transform-kubeconfig
      - task: minio:port-forward
        with:
          address: "127.0.0.1"
      - task: minio:configure-alias
      - task: minio:upload
        with:
          alias: "local"
          bucket: "uds"
          object: "uds-dev-config"
          file: "./uds-dev-config"

  - name: fetch-kubeconfig
    description: "Fetch kubeconfig from remote MinIO (bucket uds/object uds-dev-config) to ~/.kube/uds-dev-config"
    actions:
      - cmd: |
          set -e
          if [ -z "${MINIO_REMOTE_ENDPOINT}" ] || [ -z "${MINIO_REMOTE_ACCESS_KEY}" ] || [ -z "${MINIO_REMOTE_SECRET_KEY}" ]; then
            echo "ERROR: set MINIO_REMOTE_ENDPOINT, MINIO_REMOTE_ACCESS_KEY, MINIO_REMOTE_SECRET_KEY" >&2
            exit 1
          fi
      - task: minio:configure-remote-alias
        with:
          alias: "remote"
          endpoint: "${MINIO_REMOTE_ENDPOINT}"
          accessKey: "${MINIO_REMOTE_ACCESS_KEY}"
          secretKey: "${MINIO_REMOTE_SECRET_KEY}"
      - task: minio:download
        with:
          alias: "remote"
          bucket: "uds"
          object: "uds-dev-config"
          out: "$HOME/.kube/uds-dev-config"

  - name: deploy
    description: "Deploy K3d cluster with development settings"
    actions:
      - description: "Deploy K3d cluster with root zarf-config.toml"
        cmd: |
          ZARF_CONFIG="$CONFIG_FILE" uds zarf package deploy zarf-package-uds-k3d-*-${K3D_PACKAGE_VERSION}.tar.zst \
            --confirm

  - name: clean
    description: "Remove local UDS K3d package files"
    actions:
      - description: "Clean up local K3d package files"
        cmd: |
          echo "Cleaning up local UDS K3d package files"
          rm -f zarf-package-uds-k3d*.tar.zst
          echo "Package files removed"

  - name: setup-zarf-registry-minio-backend
    description: "Set up MinIO backend for the zarf registry to use as a backend"
    actions: 
      - task: minio:port-forward
      - task: minio:configure-alias
      - task: minio:create-bucket
        with:
          alias: local
          bucket: zarf-registry
      - task: minio:create-policy
        with:
          alias: local
          policy: zarf-registry-policy
          file: zarf-registry-policy.json
      - task: minio:create-user
        with:
          alias: local
          username: zarf-registry
          secret: zarf-registry-secret
      - task: minio:attach-policy-to-user
        with:
          alias: local
          policy: zarf-registry-policy
          username: zarf-registry
