# Kubeconfig helpers

variables:
  - name: KUBECONFIG_IN
    description: "Input kubeconfig path (default: ./kubeconfig if present, else $KUBECONFIG, else ~/.kube/config)"
    default: ""
  - name: KUBECONFIG_OUT
    description: "Output kubeconfig path"
    default: "./uds.dev"
  - name: KUBECONFIG_LAN_IP
    description: "LAN IP to rewrite the kubeconfig server to (auto-detected if empty)"
    default: ""
  - name: KUBECONFIG_PORT
    description: "Optional API server port override"
    default: ""

tasks:
  - name: transform
    description: "Rewrite a kubeconfig so it’s usable from another machine (0.0.0.0:<port> -> LAN IP)"
    actions:
      - cmd: |
          set -e

          SCRIPT="./src/kubeconfig-transform/transform-kubeconfig.sh"
          if [ ! -f "$SCRIPT" ]; then
            echo "Expected script not found: $SCRIPT" >&2
            exit 1
          fi

          IP="${KUBECONFIG_LAN_IP}"
          if [ -z "$IP" ]; then
            # Auto-detect primary IPv4 used for egress (works well on Linux VMs)
            if command -v ip >/dev/null 2>&1; then
              IP="$(ip -4 route get 1.1.1.1 2>/dev/null | awk '{for (i=1;i<=NF;i++) if ($i=="src") {print $(i+1); exit}}')"
            fi
            # Fallback
            if [ -z "$IP" ] && command -v hostname >/dev/null 2>&1; then
              IP="$(hostname -I 2>/dev/null | awk '{print $1}')"
            fi
          fi

          if [ -z "$IP" ]; then
            echo "ERROR: could not auto-detect LAN IP; set KUBECONFIG_LAN_IP" >&2
            exit 1
          fi

          IN_PATH="${KUBECONFIG_IN}"
          if [ -z "$IN_PATH" ]; then
            if [ -f "./kubeconfig" ]; then
              IN_PATH="./kubeconfig"
            elif [ -n "${KUBECONFIG:-}" ]; then
              IN_PATH="$KUBECONFIG"
            else
              IN_PATH="$HOME/.kube/config"
            fi
          fi

          ARGS=("--in" "$IN_PATH" "--out" "${KUBECONFIG_OUT}" "--ip" "$IP")
          if [ -n "${KUBECONFIG_PORT}" ]; then
            ARGS+=("--port" "${KUBECONFIG_PORT}")
          fi

          bash "$SCRIPT" "${ARGS[@]}"

          echo "Sanity check (best-effort):" >&2
          KUBECONFIG="${KUBECONFIG_OUT}" uds zarf tools kubectl cluster-info || true

          echo "Wrote: ${KUBECONFIG_OUT}" >&2
