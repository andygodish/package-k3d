tasks:
  - name: port-forward
    description: "Port forward MinIO backend and console service (default binds to 127.0.0.1)"
    inputs:
      address:
        description: "Address to bind port-forward to (use 0.0.0.0 for remote access)"
        required: false
        default: "127.0.0.1"
    actions:
      - cmd: |
          set -e

          # Ensure 9000/9001 are free before starting (avoids confusing bind errors)
          bash ./src/kubeconfig-transform/ensure-ports-free.sh 9000 9001

          echo "Port forwarding MinIO backend service to ${{ .inputs.address }}:9000"
          nohup uds zarf tools kubectl port-forward --address ${{ .inputs.address }} -n uds-dev-stack svc/minio 9000:9000 >/tmp/minio-port-forward.log 2>&1 &
          echo "Port forwarding MinIO console service to ${{ .inputs.address }}:9001"
          nohup uds zarf tools kubectl port-forward --address ${{ .inputs.address }} -n uds-dev-stack svc/minio-console 9001:9001 >>/tmp/minio-port-forward.log 2>&1 &
          echo "Port-forwarding started; logs in /tmp/minio-port-forward.log"

  - name: configure-alias
    actions:
      - cmd: |
          MINIO_USER="$(uds zarf tools kubectl get secret -n uds-dev-stack minio -o yaml | uds zarf tools yq '.data.rootUser' | base64 -d)"
          MINIO_PASSWORD="$(uds zarf tools kubectl get secret -n uds-dev-stack minio -o yaml | uds zarf tools yq '.data.rootPassword' | base64 -d)"

          echo "Configuring MinIO alias 'local' with access key '${MINIO_USER}'"

          # Wait briefly for port-forward to be ready (avoid race)
          for i in $(seq 1 20); do
            curl -sf http://127.0.0.1:9000/minio/health/ready >/dev/null 2>&1 && break
            sleep 0.25
          done

          mc alias set local http://localhost:9000 "${MINIO_USER}" "${MINIO_PASSWORD}"

  - name: upload
    description: "Upload a local file to a bucket/object in MinIO (requires alias already configured)"
    inputs:
      alias:
        description: "mc alias to use"
        required: false
        default: "local"
      bucket:
        description: "Bucket name"
        required: true
      object:
        description: "Object name (path within bucket)"
        required: true
      file:
        description: "Local file path to upload"
        required: true
    actions:
      - cmd: |
          set -e

          if [ ! -f "${{ .inputs.file }}" ]; then
            echo "ERROR: file not found: ${{ .inputs.file }}" >&2
            exit 1
          fi

          DEST="${{ .inputs.alias }}/${{ .inputs.bucket }}/${{ .inputs.object }}"
          echo "Uploading ${{ .inputs.file }} -> ${DEST}" >&2
          mc cp "${{ .inputs.file }}" "${DEST}"

  - name: configure-remote-alias
    description: "Configure an mc alias for a remote MinIO endpoint (for downloading from another machine)"
    inputs:
      alias:
        description: "mc alias name"
        required: false
        default: "remote"
      endpoint:
        description: "MinIO endpoint URL (e.g. http://<ubuntu-ip>:9000)"
        required: true
      accessKey:
        description: "MinIO access key"
        required: true
      secretKey:
        description: "MinIO secret key"
        required: true
    actions:
      - cmd: |
          set -e
          mc alias set "${{ .inputs.alias }}" "${{ .inputs.endpoint }}" "${{ .inputs.accessKey }}" "${{ .inputs.secretKey }}"

  - name: download
    description: "Download an object from MinIO to a local path (requires alias already configured)"
    inputs:
      alias:
        description: "mc alias to use"
        required: true
      bucket:
        description: "Bucket name"
        required: true
      object:
        description: "Object name (path within bucket)"
        required: true
      out:
        description: "Local output path"
        required: true
    actions:
      - cmd: |
          set -e

          OUT="${{ .inputs.out }}"
          case "$OUT" in
            ~/*) OUT="$HOME/${OUT#~/}" ;;
          esac

          DEST_DIR="$(dirname "$OUT")"
          mkdir -p "$DEST_DIR"

          SRC="${{ .inputs.alias }}/${{ .inputs.bucket }}/${{ .inputs.object }}"
          echo "Downloading ${SRC} -> ${OUT}" >&2
          mc cp "${SRC}" "$OUT"

  - name: extract-secret-data
    inputs:
      namespace:
        description: The namespace containing your secret
        required: true
      secret:
        description: The name of the secret you wish to extract from.
        required: true
      data:
        description: yq formatted data query you wish to extract from the declared secret.
        required: true
    actions:
      - cmd: |
          uds zarf tools kubectl get secret -n ${{ .inputs.namespace }} ${{ .inputs.secret }} -o yaml | uds zarf tools yq '${{ .inputs.data }}' | base64 -d

  - name: create-bucket
    inputs:
      alias:
        description: The mc alias where the bucket will be created
        required: true
        default: "local"
      bucket:
        description: The name of the bucket to create
        required: true
    actions: 
      - cmd: |
          if mc ls ${{ .inputs.alias }}/${{ .inputs.bucket }} >/dev/null 2>&1; then
            echo "Bucket '${{ .inputs.bucket }}' already exists on alias '${{ .inputs.alias }}'—skipping create"
          else
            mc mb ${{ .inputs.alias }}/${{ .inputs.bucket }}
          fi

  - name: create-policy
    description: "Create a MinIO policy from a local policy file"
    inputs:
      alias:
        description: The mc alias where the policy will be created
        required: true
        default: "local"
      policy:
        description: The name of the policy to create
        required: true
      file:
        description: The local policy file to use
        required: false
    actions:
      - cmd: mc admin policy create ${{ .inputs.alias }} ${{ .inputs.policy }} ${{ .inputs.file }}

  - name: create-user
    description: "Create a MinIO user with access and secret keys"
    inputs:
      alias:
        description: The mc alias where the user will be created
        required: true
        default: "local"
      username:
        description: The username for the new user
        required: true
      secret:
        description: The secret key for the new user
        required: true
    actions:
      - cmd: mc admin user add ${{ .inputs.alias }} ${{ .inputs.username }} ${{ .inputs.secret }}

  - name: attach-policy-to-user
    inputs:
      alias:
        description: The mc alias where the policy will be attached
        required: true
        default: "local"
      policy:
        description: The name of the policy to attach
        required: true
      username:
        description: The username to attach the policy to
        required: true
    actions:
      - cmd: mc admin policy attach ${{ .inputs.alias }} ${{ .inputs.policy }} --user ${{ .inputs.username }}

  - name: list-policies
    description: "List MinIO policies on specified alias"
    inputs:
      alias:
        description: The mc alias to list policies from
        required: true
        default: "local"
    actions:
      - cmd: mc admin policy list ${{ .inputs.alias }}

  - name: list-users
    description: "List MinIO users on specified alias"
    inputs:
      alias:
        description: The mc alias to list users from
        required: true
        default: "local"
    actions:
      - cmd: mc admin user list ${{ .inputs.alias }}

  - name: inspect-user
    description: "Inspect MinIO user details on specified alias"
    inputs:
      alias:
        description: The mc alias to inspect the user from
        required: true
        default: "local"
      username:
        description: The username to inspect
        required: true
    actions:
      - cmd: mc admin user info ${{ .inputs.alias }} ${{ .inputs.username }}
